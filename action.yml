name: dataproduct-kit
description: Validate agent-ready data product manifests in CI.

inputs:
  path:
    description: Repo path or data product directory to validate.
    required: false
    default: "."
  fail-on:
    description: Exit nonzero when the suite reaches this status.
    required: false
    default: "fail"
  format:
    description: Output format for validation results.
    required: false
    default: "github"
  profile:
    description: Readiness profile to apply.
    required: false
    default: "production"
  sarif:
    description: Path where the SARIF report should be written.
    required: false
    default: "dataproduct-kit.sarif.json"
  python-version:
    description: Python version used to run dataproduct-kit.
    required: false
    default: "3.13"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install dataproduct-kit
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install "${{ github.action_path }}"

    - name: Validate data products
      shell: bash
      run: |
        dataproduct-kit ci "${{ inputs.path }}" \
          --profile "${{ inputs.profile }}" \
          --format "${{ inputs.format }}" \
          --fail-on "${{ inputs.fail-on }}" \
          --sarif "${{ inputs.sarif }}"
