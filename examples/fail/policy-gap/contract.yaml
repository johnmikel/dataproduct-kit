version: "0.1"
dataset: subscriptions
schema:
  - name: customer_id
    type: string
    nullable: false
  - name: plan
    type: string
    nullable: false
  - name: status
    type: string
    nullable: false
  - name: churned
    type: boolean
    nullable: false
  - name: monthly_recurring_revenue
    type: number
    nullable: false
  - name: updated_at
    type: timestamp
    nullable: false
quality_checks:
  - name: enough_rows
    type: row_count_min
    value: 5
